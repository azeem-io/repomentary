name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        # version comes from "packageManager" in package.json

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install

      - name: Lint & format (Biome)
        run: pnpm check

      - name: Typecheck
        run: pnpm typecheck

      - name: Build (Next.js)
        run: pnpm build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
