name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Flip the repository variable ENABLE_DEPLOY to 'true' once the
    # CLOUDFLARE_API_TOKEN + CLOUDFLARE_ACCOUNT_ID secrets are set.
    if: vars.ENABLE_DEPLOY == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install

      - name: Build & deploy to Cloudflare Workers
        run: pnpm --filter @repomentary/web deploy
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
